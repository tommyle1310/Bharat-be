version: "3.8"
services:
  app:
    build: .
    container_name: indus_auction_system_buyer_service_backend
    restart: always
    # always map host 1310 -> container 4000
    ports:
      - "1310:1310"
    env_file:
      - .env.test
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - indus_buyer_net

networks:
  indus_buyer_net:
    external: true
    name: indus_buyer_net
