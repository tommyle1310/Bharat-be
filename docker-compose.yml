services:
  app:
    build: .
    container_name: kmsg-buyer-backend
    restart: unless-stopped
    ports:
      - "4001:4000"
    env_file:
      - .env.test
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kmsg_buyer_net

networks:
  kmsg_buyer_net:
    external: true
    name: kmsg_buyer_net
