version: "3.9"

services:
  # Application service (using external database)
  app:
    build: .
    container_name: kmsg-buyer-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env  # Use your .env file with external database
    volumes:
      - ./data-files:/app/data-files
      - ./public:/app/public
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s